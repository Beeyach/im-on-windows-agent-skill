name: Publish v0.1.0 once

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-once.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Publish v0.1.0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v0.1.0 \
            --repo "$GITHUB_REPOSITORY" \
            --target "35e56854160f7bc6582b1f22f485109c7210e38f" \
            --title "I'm on Windows v0.1.0" \
            --notes "First public release. A Windows-aware Agent Skill for Claude Code and Codex that prevents PowerShell, Bash, WSL, path, and toolchain mixups."
